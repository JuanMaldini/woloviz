<!doctype html>
<html>
  <link rel="icon" href="data:;base64,iVBORw0KGgo=" />
  <script src="/projects/artracking/js/aframe.min.js"></script>
  <script src="/projects/artracking/js/aframe-ar.js"></script>
  <body style="margin: 0px; overflow: hidden">
    <script>
      let markerVisible = false;
      const params = new URLSearchParams(window.location.search);
      const modelUrl = params.get("modelUrl")?.trim() || "";
      const modelRotation = params.get("modelRotation")?.trim() || "0 0 0";
      const modelScale = params.get("modelScale")?.trim() || "1 1 1";
      const showFollowerPlaneParam = params.get("showFollowerPlane");
      const hasSupportedModel = /^\/.*\.(glb|gltf)$/i.test(modelUrl);
      const showFollowerPlane =
        showFollowerPlaneParam === null
          ? !hasSupportedModel
          : /^(1|true)$/i.test(showFollowerPlaneParam);

      AFRAME.registerComponent("registerevents", {
        init: function () {
          let marker = this.el;
          let follower = document.querySelector("#follower");
          let followerPlane = document.querySelector("#followerPlane");

          followerPlane.setAttribute(
            "material",
            "visible",
            showFollowerPlane ? "true" : "false",
          );

          if (hasSupportedModel && !document.querySelector("#followerModel")) {
            let followerModel = document.createElement("a-entity");
            followerModel.setAttribute("id", "followerModel");
            followerModel.setAttribute("gltf-model", modelUrl);
            followerModel.setAttribute("position", "0 0.01 0");
            followerModel.setAttribute("rotation", modelRotation);
            followerModel.setAttribute("scale", modelScale);
            follower.appendChild(followerModel);
          }

          marker.addEventListener("markerFound", function () {
            if (follower.getAttribute("active") == "0") {
              follower.setAttribute("active", "1");
              if (showFollowerPlane) {
                followerPlane.setAttribute("material", "visible", "true");
              }
            }
            markerVisible = true;
          });

          marker.addEventListener("markerLost", function () {
            markerVisible = false;
          });

          this.p = new THREE.Vector3();
          this.q = new THREE.Quaternion();
          this.s = new THREE.Vector3();
        },

        tick: function (time, deltaTime) {
          if (markerVisible) {
            let marker = this.el;
            let follower = document.querySelector("#follower");
            let followerPlane = document.querySelector("#followerPlane");

            let lerpAmount = 0.5;

            marker.object3D.getWorldPosition(this.p);
            marker.object3D.getWorldQuaternion(this.q);
            marker.object3D.getWorldScale(this.s);

            follower.object3D.position.lerp(this.p, lerpAmount);
            follower.object3D.quaternion.slerp(this.q, lerpAmount);
            follower.object3D.scale.lerp(this.s, lerpAmount);

            if (showFollowerPlane) {
              followerPlane.setAttribute("color", "green");
            }
          } else {
            if (showFollowerPlane) {
              followerPlane.setAttribute("color", "red");
            }
          }
        },
      });
    </script>

    <a-scene
      embedded
      vr-mode-ui="enabled: false;"
      arjs="debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    >
      <a-assets>
        <img id="grid" src="/projects/artracking/images/border.png" />
      </a-assets>

      <a-marker
        type="pattern"
        url="/projects/artracking/data/kanji.patt"
        id="baseMarker"
        registerevents
      >
      </a-marker>

      <a-entity id="follower" active="0">
        <a-plane
          id="followerPlane"
          position="0 0 0"
          rotation="-90 0 0"
          color="green"
          material="src:#grid; transparent: true; opacity: 0.90; side:double; visible:false;"
        >
        </a-plane>
      </a-entity>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
